<!DOCTYPE html>
<html>
<head>
    <title>Archie Code Graph</title>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Left Sidebar */
        .sidebar {
            width: 300px;
            background: #151b3d;
            border-right: 1px solid #2a3254;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .sidebar-header h1 {
            font-size: 20px;
            color: #4fc3f7;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            color: #888;
        }
        
        .stats {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #4fc3f7;
            font-weight: 600;
        }
        
        .filters {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .filter-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .filter-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            font-size: 13px;
        }
        
        .filter-item:hover {
            color: #4fc3f7;
        }
        
        .filter-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .search-box {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #2a3254;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .node-details {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .node-details::-webkit-scrollbar {
            width: 6px;
        }
        
        .node-details::-webkit-scrollbar-track {
            background: #151b3d;
        }
        
        .node-details::-webkit-scrollbar-thumb {
            background: #2a3254;
            border-radius: 3px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .detail-content {
            font-size: 13px;
            color: #fff;
            line-height: 1.6;
            word-break: break-word;
        }
        
        .detail-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #2a3254;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        /* Graph Canvas */
        .graph-container {
            flex: 1;
            position: relative;
            background: #0a0e27;
        }
        
        #graph {
            width: 100%;
            height: 100%;
        }
        
        .graph-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(21, 27, 61, 0.95);
            border: 1px solid #2a3254;
            border-radius: 8px;
            padding: 15px;
        }
        
        .control-btn {
            display: block;
            width: 40px;
            height: 40px;
            background: #2a3254;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #4fc3f7;
            color: #000;
        }
        
        .control-btn:last-child {
            margin-bottom: 0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a3254;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 Archie Graph</h1>
                <p>Code Knowledge Graph</p>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Nodes</span>
                    <span class="stat-value" id="totalNodes">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Edges</span>
                    <span class="stat-value" id="totalEdges">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Files</span>
                    <span class="stat-value" id="totalFiles">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Functions</span>
                    <span class="stat-value" id="totalFunctions">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Classes</span>
                    <span class="stat-value" id="totalClasses">-</span>
                </div>
            </div>
            
            <div class="filters">
                <div class="filter-title">Entity Types</div>
                <div class="filter-item" onclick="filterByType('all')">
                    <div class="filter-color" style="background: #fff;"></div>
                    <span>All</span>
                </div>
                <div class="filter-item" onclick="filterByType('file')">
                    <div class="filter-color" style="background: #4fc3f7;"></div>
                    <span>Files</span>
                </div>
                <div class="filter-item" onclick="filterByType('function')">
                    <div class="filter-color" style="background: #ffb74d;"></div>
                    <span>Functions</span>
                </div>
                <div class="filter-item" onclick="filterByType('class')">
                    <div class="filter-color" style="background: #ba68c8;"></div>
                    <span>Classes</span>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search nodes..." onkeyup="searchNodes()">
            </div>
            
            <div class="node-details" id="nodeDetails">
                <div class="empty-state">
                    <div class="empty-state-icon">👆</div>
                    <p>Click a node to see details</p>
                </div>
            </div>
        </div>
        
        <!-- Graph Canvas -->
        <div class="graph-container">
            <div id="graph"></div>
            
            <div class="graph-controls">
                <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="control-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                <button class="control-btn" onclick="resetView()" title="Reset View">⟲</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px; color: #888;">Loading graph...</p>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/force-graph"></script>
    <script>
        let graphData = null;
        let graphInstance = null;
        let allNodes = [];
        let allEdges = [];
        
        // Color mapping
        const colors = {
            'file': '#4fc3f7',
            'function': '#ffb74d',
            'class': '#ba68c8',
            'unknown': '#666666'
        };
        
        // Load graph data
        async function loadGraph() {
            try {
                const response = await fetch('/graph/visualize?max_nodes=500');
                graphData = await response.json();
                
                allNodes = graphData.nodes;
                allEdges = graphData.edges;
                
                // Update stats
                document.getElementById('totalNodes').textContent = graphData.stats.total_nodes.toLocaleString();
                document.getElementById('totalEdges').textContent = graphData.stats.total_edges.toLocaleString();
                document.getElementById('totalFiles').textContent = graphData.stats.files.toLocaleString();
                document.getElementById('totalFunctions').textContent = graphData.stats.functions.toLocaleString();
                document.getElementById('totalClasses').textContent = graphData.stats.classes.toLocaleString();
                
                // Render graph
                renderGraph(graphData);
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error loading graph:', error);
                document.getElementById('loading').innerHTML = '<p style="color: #ef4444;">Error loading graph</p>';
            }
        }
        
        function renderGraph(data) {
            const elem = document.getElementById('graph');
            
            graphInstance = ForceGraph()(elem)
                .graphData(data)
                .nodeLabel(node => `${node.label} (${node.type})`)
                .nodeColor(node => colors[node.type] || colors['unknown'])
                .nodeVal(node => {
                    if (node.type === 'file') return 8;
                    if (node.type === 'class') return 6;
                    return 4;
                })
                .linkColor(() => 'rgba(255, 255, 255, 0.2)')
                .linkWidth(1)
                .linkDirectionalParticles(link => link.type === 'calls' ? 2 : 0)
                .linkDirectionalParticleWidth(2)
                .linkDirectionalParticleSpeed(0.005)
                .onNodeClick(showNodeDetails)
                .d3Force('charge').strength(-100)
                .d3Force('link').distance(50);
        }
        
        function showNodeDetails(node) {
            const details = document.getElementById('nodeDetails');
            
            details.innerHTML = `
                <div class="detail-section">
                    <div class="detail-title">Name</div>
                    <div class="detail-content">${node.label}</div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-title">Type</div>
                    <div class="detail-content">
                        <span class="detail-badge" style="background: ${colors[node.type]}; color: #000;">
                            ${node.type.toUpperCase()}
                        </span>
                    </div>
                </div>
                
                ${node.file_path ? `
                <div class="detail-section">
                    <div class="detail-title">File Path</div>
                    <div class="detail-content">${node.file_path}</div>
                </div>
                ` : ''}
                
                ${node.line_start ? `
                <div class="detail-section">
                    <div class="detail-title">Lines</div>
                    <div class="detail-content">${node.line_start} - ${node.line_end}</div>
                </div>
                ` : ''}
                
                <div class="detail-section">
                    <div class="detail-title">Connections</div>
                    <div class="detail-content">
                        ${allEdges.filter(e => e.source === node.id || e.target === node.id).length} edges
                    </div>
                </div>
            `;
        }
        
        function filterByType(type) {
            if (type === 'all') {
                graphInstance.graphData({ nodes: allNodes, edges: allEdges, stats: graphData.stats });
            } else {
                const filtered = allNodes.filter(n => n.type === type);
                const nodeIds = new Set(filtered.map(n => n.id));
                const filteredEdges = allEdges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
                graphInstance.graphData({ nodes: filtered, edges: filteredEdges, stats: graphData.stats });
            }
        }
        
        function searchNodes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if (!query) {
                graphInstance.graphData({ nodes: allNodes, edges: allEdges, stats: graphData.stats });
                return;
            }
            
            const filtered = allNodes.filter(n => 
                n.label.toLowerCase().includes(query) ||
                (n.file_path && n.file_path.toLowerCase().includes(query))
            );
            const nodeIds = new Set(filtered.map(n => n.id));
            const filteredEdges = allEdges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
            graphInstance.graphData({ nodes: filtered, edges: filteredEdges, stats: graphData.stats });
        }
        
        function zoomIn() {
            graphInstance.zoom(graphInstance.zoom() * 1.2);
        }
        
        function zoomOut() {
            graphInstance.zoom(graphInstance.zoom() / 1.2);
        }
        
        function resetView() {
            graphInstance.zoomToFit(400);
        }
        
        // Load on page load
        loadGraph();
    </script>
</body>
</html>
