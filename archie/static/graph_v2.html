<!DOCTYPE html>
<html>
<head>
    <title>Archie Code Graph</title>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 320px;
            background: #151b3d;
            border-right: 1px solid #2a3254;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .sidebar-header h1 {
            font-size: 20px;
            color: #4fc3f7;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            color: #888;
        }
        
        .controls {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .control-group {
            margin-bottom: 15px;
        }
        
        .control-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }
        
        .control-input {
            width: 100%;
            padding: 8px 12px;
            background: #0a0e27;
            border: 1px solid #2a3254;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
        }
        
        .control-input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        
        .btn {
            width: 100%;
            padding: 10px;
            background: #4fc3f7;
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #29b6f6;
        }
        
        .stats {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #4fc3f7;
            font-weight: 600;
        }
        
        .filters {
            padding: 15px 20px;
            border-bottom: 1px solid #2a3254;
        }
        
        .filter-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .filter-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .filter-item:hover {
            color: #4fc3f7;
        }
        
        .filter-item.active {
            color: #4fc3f7;
            font-weight: 600;
        }
        
        .filter-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .node-details {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .node-details::-webkit-scrollbar {
            width: 6px;
        }
        
        .node-details::-webkit-scrollbar-track {
            background: #151b3d;
        }
        
        .node-details::-webkit-scrollbar-thumb {
            background: #2a3254;
            border-radius: 3px;
        }
        
        .detail-section {
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .detail-content {
            font-size: 13px;
            color: #fff;
            line-height: 1.6;
            word-break: break-word;
        }
        
        .detail-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #2a3254;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .graph-container {
            flex: 1;
            position: relative;
            background: #0a0e27;
        }
        
        #graph {
            width: 100%;
            height: 100%;
        }
        
        .graph-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(21, 27, 61, 0.95);
            border: 1px solid #2a3254;
            border-radius: 8px;
            padding: 10px;
        }
        
        .control-btn {
            display: block;
            width: 40px;
            height: 40px;
            background: #2a3254;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            background: #4fc3f7;
            color: #000;
        }
        
        .control-btn:last-child {
            margin-bottom: 0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a3254;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }
        
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(21, 27, 61, 0.95);
            border: 1px solid #2a3254;
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
        }
        
        .legend-title {
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 Archie Graph</h1>
                <p>Code Knowledge Graph</p>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label class="control-label">Max Nodes</label>
                    <input type="number" id="maxNodes" class="control-input" value="200" min="10" max="2000" step="50">
                </div>
                
                <div class="control-group">
                    <label class="control-label">Search Files</label>
                    <input type="text" id="fileFilter" class="control-input" placeholder="e.g., models, api, utils">
                </div>
                
                <button class="btn" onclick="reloadGraph()">🔄 Reload Graph</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Showing</span>
                    <span class="stat-value" id="showingNodes">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Nodes</span>
                    <span class="stat-value" id="totalNodes">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Edges</span>
                    <span class="stat-value" id="totalEdges">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Files</span>
                    <span class="stat-value" id="totalFiles">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Functions</span>
                    <span class="stat-value" id="totalFunctions">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Classes</span>
                    <span class="stat-value" id="totalClasses">-</span>
                </div>
            </div>
            
            <div class="filters">
                <div class="filter-title">Filter by Type</div>
                <div class="filter-item active" data-type="all" onclick="filterByType('all', this)">
                    <div class="filter-color" style="background: #fff;"></div>
                    <span>All Types</span>
                </div>
                <div class="filter-item" data-type="file" onclick="filterByType('file', this)">
                    <div class="filter-color" style="background: #4fc3f7;"></div>
                    <span>Files Only</span>
                </div>
                <div class="filter-item" data-type="function" onclick="filterByType('function', this)">
                    <div class="filter-color" style="background: #ffb74d;"></div>
                    <span>Functions Only</span>
                </div>
                <div class="filter-item" data-type="class" onclick="filterByType('class', this)">
                    <div class="filter-color" style="background: #ba68c8;"></div>
                    <span>Classes Only</span>
                </div>
            </div>
            
            <div class="node-details" id="nodeDetails">
                <div class="empty-state">
                    <div style="font-size: 48px; margin-bottom: 15px; opacity: 0.5;">👆</div>
                    <p>Click a node to see details</p>
                </div>
            </div>
        </div>
        
        <div class="graph-container">
            <div id="graph"></div>
            
            <div class="graph-controls">
                <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
                <button class="control-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                <button class="control-btn" onclick="resetView()" title="Reset View">⟲</button>
            </div>
            
            <div class="legend">
                <div class="legend-title">Node Types</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4fc3f7;"></div>
                    <span>Files</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffb74d;"></div>
                    <span>Functions</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ba68c8;"></div>
                    <span>Classes</span>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p style="margin-top: 15px; color: #888;">Loading graph...</p>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/force-graph"></script>
    <script>
        let graphData = null;
        let graphInstance = null;
        let allNodes = [];
        let allEdges = [];
        let currentFilter = 'all';
        
        const colors = {
            'file': '#4fc3f7',
            'function': '#ffb74d',
            'class': '#ba68c8',
            'unknown': '#666666'
        };
        
        async function loadGraph() {
            const maxNodes = document.getElementById('maxNodes').value || 200;
            const fileFilter = document.getElementById('fileFilter').value.toLowerCase().trim();
            
            try {
                document.getElementById('loading').style.display = 'block';
                
                const url = `/graph/visualize?max_nodes=${maxNodes}`;
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                graphData = await response.json();
                allNodes = graphData.nodes;
                allEdges = graphData.edges;
                
                // Apply file filter if provided
                const fileFilter = document.getElementById('fileFilter').value.toLowerCase().trim();
                if (fileFilter) {
                    allNodes = allNodes.filter(n => 
                        n.label.toLowerCase().includes(fileFilter) ||
                        (n.file_path && n.file_path.toLowerCase().includes(fileFilter))
                    );
                }
                
                // Update stats
                document.getElementById('showingNodes').textContent = allNodes.length;
                document.getElementById('totalNodes').textContent = graphData.stats.total_nodes.toLocaleString();
                document.getElementById('totalEdges').textContent = graphData.stats.total_edges.toLocaleString();
                document.getElementById('totalFiles').textContent = graphData.stats.files.toLocaleString();
                document.getElementById('totalFunctions').textContent = graphData.stats.functions.toLocaleString();
                document.getElementById('totalClasses').textContent = graphData.stats.classes.toLocaleString();
                
                renderGraph();
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: #ef4444;">Error loading graph</p>
                    <p style="color: #888; font-size: 12px; margin-top: 10px;">${error.message}</p>
                `;
            }
        }
        
        function renderGraph() {
            const elem = document.getElementById('graph');
            
            // Filter nodes based on current filter
            let nodes = allNodes;
            if (currentFilter !== 'all') {
                nodes = allNodes.filter(n => n.type === currentFilter);
            }
            
            const nodeIds = new Set(nodes.map(n => n.id));
            const edges = allEdges.filter(e => 
                nodeIds.has(e.source) && nodeIds.has(e.target)
            );
            
            const graphData = {
                nodes: nodes,
                links: edges.map(e => ({
                    source: e.source,
                    target: e.target,
                    type: e.type
                }))
            };
            
            if (graphInstance) {
                graphInstance.graphData(graphData);
                return;
            }
            
            graphInstance = ForceGraph()(elem)
                .graphData(graphData)
                .nodeLabel(node => {
                    const name = node.label.split('/').pop() || node.label;
                    return `<div style="background: rgba(0,0,0,0.9); padding: 8px; border-radius: 4px; font-size: 12px; max-width: 300px;">
                        <strong style="color: ${colors[node.type]};">${name}</strong><br/>
                        <span style="color: #888;">Type: ${node.type}</span>
                    </div>`;
                })
                .nodeColor(node => colors[node.type] || colors['unknown'])
                .nodeRelSize(4)
                .nodeVal(node => {
                    if (node.type === 'file') return 12;
                    if (node.type === 'class') return 8;
                    return 5;
                })
                .linkColor(link => {
                    if (link.type === 'calls') return 'rgba(79, 195, 247, 0.3)';
                    if (link.type === 'imports') return 'rgba(255, 183, 77, 0.3)';
                    return 'rgba(255, 255, 255, 0.15)';
                })
                .linkWidth(1)
                .linkDirectionalArrowLength(4)
                .linkDirectionalArrowRelPos(1)
                .linkDirectionalParticles(link => link.type === 'calls' ? 1 : 0)
                .linkDirectionalParticleWidth(2)
                .linkDirectionalParticleSpeed(0.002)
                .onNodeClick(showNodeDetails)
                .onNodeHover(node => {
                    elem.style.cursor = node ? 'pointer' : 'default';
                })
                .cooldownTicks(200)
                .onEngineStop(() => {
                    setTimeout(() => graphInstance.zoomToFit(400, 80), 100);
                });
            
            // Configure forces separately
            graphInstance.d3Force('charge').strength(-300);
            graphInstance.d3Force('link').distance(100);
            graphInstance.d3Force('center').strength(0.05);
        }
        
        function showNodeDetails(node) {
            const details = document.getElementById('nodeDetails');
            const displayName = node.label.split('/').pop() || node.label;
            
            const outgoing = allEdges.filter(e => e.source === node.id || (e.source.id && e.source.id === node.id));
            const incoming = allEdges.filter(e => e.target === node.id || (e.target.id && e.target.id === node.id));
            
            details.innerHTML = `
                <div class="detail-section">
                    <div class="detail-title">Name</div>
                    <div class="detail-content" style="font-weight: 600; color: ${colors[node.type]}; font-size: 14px;">
                        ${displayName}
                    </div>
                </div>
                
                <div class="detail-section">
                    <div class="detail-title">Type</div>
                    <div class="detail-content">
                        <span class="detail-badge" style="background: ${colors[node.type]}; color: #000;">
                            ${node.type.toUpperCase()}
                        </span>
                    </div>
                </div>
                
                ${node.file_path ? `
                <div class="detail-section">
                    <div class="detail-title">Path</div>
                    <div class="detail-content" style="font-size: 11px; color: #888; word-break: break-all;">
                        ${node.file_path}
                    </div>
                </div>
                ` : ''}
                
                <div class="detail-section">
                    <div class="detail-title">Connections</div>
                    <div class="detail-content">
                        <div class="detail-badge">Outgoing: ${outgoing.length}</div>
                        <div class="detail-badge">Incoming: ${incoming.length}</div>
                    </div>
                </div>
            `;
        }
        
        function filterByType(type, element) {
            currentFilter = type;
            
            // Update active state
            document.querySelectorAll('.filter-item').forEach(item => {
                item.classList.remove('active');
            });
            if (element) {
                element.classList.add('active');
            }
            
            renderGraph();
        }
        
        function reloadGraph() {
            loadGraph();
        }
        
        function zoomIn() {
            if (graphInstance) graphInstance.zoom(graphInstance.zoom() * 1.3);
        }
        
        function zoomOut() {
            if (graphInstance) graphInstance.zoom(graphInstance.zoom() / 1.3);
        }
        
        function resetView() {
            if (graphInstance) graphInstance.zoomToFit(400, 80);
        }
        
        // Load on start
        loadGraph();
    </script>
</body>
</html>
